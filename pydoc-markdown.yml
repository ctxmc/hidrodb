loaders:
  - type: python
    search_path: [.]
    modules:
      - main
      - config
      - hidro_webservices
      - jobs
      - models
      - database
processors:
  - type: filter
  - type: smart
  - type: crossref
renderer:
  type: mkdocs
  output_directory: wiki
  content_directory_name: ./
  pages:
    - title: Home
      name: Home
      source: README
    - title: Jobs
      name: jobs
      contents:
        - 'jobs.*'
  mkdocs_config:
    site_name: HidroDB
    theme: readthedocs
    repo_url: https://github.com/ctxmc/hidrodb
